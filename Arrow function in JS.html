<!DOCTYPE html>
<html>
    <body>
        <h2>Javascript Arrow function</h2>
        <p>This is example shows an Arrow function with a parameter</p>
        <p id="result"></p>
        <script>
            const add = (a,b) => a + b;

            document.getElementById("result").innerHTML= add(12,77);
        </script>
    </body>
</html>

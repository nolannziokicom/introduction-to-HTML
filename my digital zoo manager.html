<!DOCTYPE html>
<html>

<head>
    <title>My zoo </title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: coral;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: cyan;
        }

        #zoo {
            border: 5px rgb(0, 255, 26);
            width: 400px;
            margin: 16px auto;
            padding: 15px;
            background: white;
        }

        .zone {
            border: 2px solid rgb(255, 230, 0);
            margin: 6px 0;
            padding: 8px 15px;
            border-radius: 6px;
            text-align: left;
        }

        button {
            background: orange;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>My Zoo</h1>
    <p>Use Javascript and the DOM to add animals to each cage</p>

    <div id="zoo">
        <div class="zone">Zone 1: <span id="zone1"></span></div>
        <div class="zone">Zone 2: <span id="zone2"></span></div>
        <div class="zone">Zone 3: <span id="zone3"></span></div>
        <div class="zone">Total animals: <span id="Total"></span></div>
    </div>

    <br>

    <button onclick="openZoo()">Open the zoo!</button>

    <p id="zoo-status"></p>

    <script>
        function openZoo() {

            document.getElementById("zone1").innerHTML = "alligator";

            document.getElementById("zone2").innerHTML = "crocodile";

            document.getElementById("zone3").innerHTML = "white rhinod";

            document.getElementById("Total").innerHTML = "3";

            document.getElementById("zoo").style.backgroundColor = "lightgreen"

            document.getElementById("zoo-status").innerHTML = document.title + " is now open";
        }
    </script>
</body>

</html>

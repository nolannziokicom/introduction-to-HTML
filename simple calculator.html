<!DOCTYPE html>
<html>
    <body>
        <h1>Simple calculator</h1>
        <p>multiplication of two numbers</p>
        <p id="result"></p>

        <script>
            var num1= 7;
            var num2=  14;
            var multiply= num1 * num2;
            document.getElementById("result").innerHTML ="the total number after multiplication is: " * multiply;
        </script>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Mark and Code</title>
        <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>

    <body>
        <p>H<sup>2</sup>O</p>
        <div class="container">
            <h1>Hightlight text</h1>
            <p>To highlight text use mark element to <mark>Hightlight</mark>text.</p>
            </div>
            <div class="container">
                <h1>Code</h1>
                <p>This is an example of some elements in html: <code>Div</code> and <code>span</code></p>
   
    </body>
</html>

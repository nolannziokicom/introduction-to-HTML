<!DOCTYPE html>
<html>
    <head>
        <style>
            *{
                text-align: center;
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;

            }
            #text{
                text-shadow: 9px 9px 1px darkgreen;
            }
            #box{
                box-shadow:9px 9px 1px darkorange;
            }
            #indent{

             text-indent: 60% ;
            }


            
        </style>
    </head>
    <body>
        <h1 id="text">We can use text-shadow to give shadow to text it self</h1>
        <h2 id="box">Or we can use shadow to the element</h2>
    </body>
</html>

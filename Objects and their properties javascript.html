<!DOCTYPE html>
<html>
    <body>
<h1>Javascript and their properties </h1>
<p>There are two diffrent ways to access an object property</p>
<p>You can use .property or ["property"].</p>
<p id="demo"></p>
<script>
    //Create an object:
    var person= {
        firstName: "Nolan.",
        age: 12,
    };
    // Display some data from the object:
    document.getElementById("demo").innerHTML = person.firstName + " I am" + person.age + " years old ";
</script>
    </body>
</html>

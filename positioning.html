<!DOCTYPE html>
<html>
    
    <head>

        <style>
            div{
                right: 30px;
                border: 3px blue;
            }
            div.absolute{
                position: absolute;
                left: 20px;
                border: 4px crimson;
            }
            div.relative{
                position: relative;
                left: 130px;
                border: 4px solid peru;
            }
            div.fixed{
                position: fixed;
                top: 10px;
                right: 20px;
            }
            div.sticky{
                position: sticky;
                top: 5px;
                width: 50px;
                border: 7px solid dimgray;
            }
        </style>
    </head>
    <body>
        <h2>Positioning</h2>
        <div>With no Positioning property</div>
        <div class="sticky">div with sticky Positioning property</div>
        <div class="relative">div With relative Positioning property
        <div class="absolute"> absolute class div 
            </div>
        </div>
        <div class="fixed">Div with fixed position property
      </div>
        
    </body>
</html>

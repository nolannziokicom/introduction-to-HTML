<!DOCTYPE html>
<html>

<body>
    <h1>Javascript String Methods</h1>
    <p>Basic methods</p>
    <script>
        var str = "SpinYAntEAtER"
        document.write(str.toUpperCase());
        document.write("<br>")
        document.write(str.toLowerCase());
        document.write("<br>")
        document.write(str.startsWith("Y"));
        document.write("<br>")

        var strl = "I learnt about methods in html";
        var patt = new RegExp("About");
        var res = patt.test(strl);
        document.write(res);

    
        

    </script>
</body>

</html>

<!DOCTYPE html>
<html>
    <body>
        <p>A function can access variables defied inside the functions</p>
        <button type="button" onclick="myfunction()">Click me</button>
        <p id="demo"></p>
        <p id="demo1"></p>
        <script>
            var b= 7;//global Variable
            function myfunction()
        {
            var a= 5;//local Variable
            document.getElementById("demo").innerHTML=b*a
        }
         document.getElementById("demo1").innerHTML=a;
         document,getElementById("demo1").innerHTML=b;
        </script>
    </body>
</html>

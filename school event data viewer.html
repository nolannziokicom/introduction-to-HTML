<!DOCTYPE html>
<html>

<head>
    <title>My delivery tracker</title>
    <style>
        body {
            font-family: sans-serif;
            background: aliceblue;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: rgb(255, 0, 0)
        }

        button {
            background: blue;
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }

        div {
            border: 1px solid blue;
            width: 280px;
            margin: 6px auto;
            padding: 8px 12px;
            text-align: left;
            border-radius: 6px;

        }
    </style>
</head>

<body>
    <h1>My delivery tracker</h1>
    <button onclick="saveevent()">Save event</button>
    <button onclick="startdelivery()">Start delivery of supplies</button>

    <div>JSON text: <span id="json-text"></span></div>
    <div>Loaded Item: <span id="loaded-item"></span></div>
    <div>Loaded Price: <span id="loaded-price"></span></div>
    <div>Status: <span id="status"></span></div>
    <div>Result: <span id="result"></span></div>

    <script>
        let event = {
            item: "Music festival",
            price: 500,
            shop: "My supplies shop"

        };
        function saveevent() {
            let jsontext = JSON.stringify(event);
            let loadedOrder = JSON.parse(jsontext);
            document.getElementById("json-text").innerHTML = jsontext;
            document.getElementById("loaded-item").innerHTML = loadedOrder.item;
            document.getElementById("loaded-price").innerHTML = "$" + loadedOrder.price;
        }
        function delay(ms) {
            return new Promise(function (resolve) {
                setTimeout(resolve, ms);

            }
            );
        }

        async function startdelivery() {
            document.getElementById("result").innerHTML = "",

                document.getElementById("status").innerHTML = "request recieved!";
            setTimeout(function () {
                document.getElementById("status").innerHTML = "supplies are being packed....";
            }, 1000);

            await delay(3000);
            document.getElementById("status").innerHTML = "Out of delivery!";

            await delay(2000);
            document.getElementById("result").innerHTML = "Your order has arrived!";

        }

    </script>
</body>

</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Botstrap large grids</title>
        <link rel="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <p>CO<sub>2</sub></p>
        <p>a<sup>2</sup></p>
        <div class="container">
            <h1>Highlight text</h1>
            <p>Use the mark element to <mark>hightlight</mark> text.</p>
            </div>

            <h1>Code Snippets</h1>
            <p>Inline snippets should be embedded in the code element:</p>
            <p>The following html elements: <code>span</code>,<code>section</code> and <code>div</code>defines a section in a document. </p>
            </div>
    </body>

<!DOCTYPE html>
<html>
    <head>
        <title>Css box model</title>
    
    <style>
        .example1{
            width: 200px;
            background-color: aqua;
            padding: 0px;
            border: 0px;
            margin: 0px;
        }
        .example2{
            width: 250px;
            background-color: blue;
            padding: 14px;
            border: 20px solid black;
            margin: 100px 60px;
        }
        hr{
            background-color: gold;
        }

    </style>
    </head>
    <body>
        <p class="example1">My content example 1</p>
        <hr style="width:600px;height:10px;">
        <p class="example2">A box🅱🅱️</p>
        <hr style="width: 200px; height: 1%; color: rgb(200, 255, 80);">
    </body>

</html>

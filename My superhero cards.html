<!DOCTYPE html>

<html>

<head>

    <title>My Planet Cards</title>

    <style>
        body {

            font-family: Arial;

            background: #f0f4ff;

            padding: 30px;

            text-align: center;

        }

        h1 {

            color: #ff5a43;

        }

        p {

            color: #555;

        }

        .cards {

            display: flex;

            justify-content: center;

            gap: 20px;

            margin-top: 25px;

        }

        .card {

            background: white;

            border: 3px solid #ff5a43;

            border-radius: 12px;

            padding: 20px;

            width: 200px;

        }

        .animal-name {

            font-size: 22px;

            font-weight: bold;

            color: #333;

        }

        .animal-fact {

            color: #666;

            margin-top: 10px;

            font-size: 14px;

        }

        button {

            background: #ff5a43;

            color: white;

            border: none;

            padding: 12px 28px;

            border-radius: 8px;

            cursor: pointer;

            font-size: 16px;

            margin-top: 10px;

        }
    </style>

</head>
<body>
    <h1>My superhero cards</h1>
    <p>Using Javascript to make superhero cards</p>
    <button onclick="showheros()">Show heros</button>
    <div class="cards">
        <div id="card1"></div>
        <div id="card2"></div>
        <div id="card3"></div>
    </div>
    <script>
        class hero {
            constructor(name, fact) {
                this.name = name;
                this.fact = fact;
            }

            describe() {
                return this.name + ":" + this.fact;
            }
        }
        function showheros() {
            let p1 = new hero ("Superman", "Did u know that superman can shoot lasers out of his eyes")
            let p2 = new hero("Spiderman", "Did you know that spiderman can shoot webs out of his hands")
            let p3 = new hero("Iron man", "Did you know that iron man has an advanced mechsuit instead of powers")

            document.getElementById("card1").innerHTML = "<div class='card'> <div class='hero-name'>" + p1.name + "</div>" + "<div class='hero-fact'>" + p1.describe() + "</div></div>";
            document.getElementById("card2").innerHTML = "<div class='card'> <div class='hero-name'>" + p2.name + "</div>" + "<div class='hero-fact'>" + p2.describe() + "</div></div>";
        
            document.getElementById("card3").innerHTML = "<div class='card'> <div class='hero-name'>" + p3.name + "</div>" + "<div class='hero-fact'>" + p3.describe() + "</div></div>";
        }
    </script>
</body>
</html>

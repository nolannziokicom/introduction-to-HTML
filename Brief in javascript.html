<!DOCTYPE html>
<html>
    <head>
    <title>Data types in Javascript</title>
    </head>
    <body>
        <h1>Javascript Data types</h1>
        <script>
            var a=7;
            var b=8;
            var c=14;
            var d=null;
            var e;//undefined variable
            document.write("a and b are equal:" + (a==b));
            document.write("<br>")
            document.write("b and c are equal:" + (b==c))
            document.write("<br>")
            document.write("The value of d is equal:" + d)
            document.write("<br>")
            document.write("The value of e is equal:" + e)
        </script>
    </body>
</html>

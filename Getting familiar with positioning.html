<!DOCTYPE html>
<html>
    <head>
        
            <style>
                div{
                    right: 40px;
                    border: 5px blue;}
                    div.absolute{
                        position: absolute;
                        left: 40px;
                        border: 3px solid violet;
                    }
                    div.relative{
                        position: relative;
                        left:100px;
                        border: 4px solid blueviolet;

                    }
                
            </style>
        
    </head>
    <body>
        <strong><h2>position</h2></strong>

      <div>With no positioning properties</div> 
      <div class="relative">this div element is position relative 
        <div class="absolute">this is showing div element absolute</div>
    </body>
</html>
